syntax = "proto3";

package bge.coordinator.v1;

import "bge/gateway/v1/common.proto";
import "grpc/health/v1/health.proto";

// Consumed by the main NestJS application only. Extends the existing lifecycle
// RPCs with search and import-oriented RPCs. The coordinator fans out to
// requested gateways concurrently and merges their streams, enriching each
// result with deduplication metadata resolved against GameSource.
service CoordinatorService {
  // Liveness
  rpc Ping(PingRequest) returns (PingResponse);

  // Standard gRPC health check
  rpc Check(grpc.health.v1.HealthCheckRequest) returns (grpc.health.v1.HealthCheckResponse);

  rpc ConnectGateway(ConnectGatewayRequest) returns (ConnectGatewayResponse);
  rpc DisconnectGateway(DisconnectGatewayRequest) returns (DisconnectGatewayResponse);

  // Fan-out across selected (or all active) gateways. Streams lean
  // GameSearchData frames as they arrive. Terminates when all selected
  // gateways have emitted SOURCE_DONE or ERROR.
  rpc SearchGames(SearchGamesRequest) returns (stream SearchGameResult);

  // Fetch full GameData for a single game from a specific gateway.
  // Used by the import worker and game detail page.
  rpc FetchGame(CoordinatorFetchGameRequest) returns (CoordinatorFetchGameResponse);

  // Fetch expansions for a base game. Coordinator resolves relevant gateways
  // from GameSource and merges their streams.
  rpc FetchExpansions(CoordinatorFetchExpansionsRequest) returns (stream SearchGameResult);
}

message PingRequest {
  optional string correlation_id = 1;
}

message PingResponse {
  string correlation_id = 1;
  int64 timestamp_ms = 2;
  string coordinator_version = 3;
}

message ConnectGatewayRequest {
  string gateway_id = 1;
  string connection_url = 2;
  int32 connection_port = 3;
  string auth_type = 4;
  optional string auth_parameters_json = 5;
}

message ConnectGatewayResponse {
  bool success = 1;
  optional string error = 2;
}

message DisconnectGatewayRequest {
  string gateway_id = 1;
}

message DisconnectGatewayResponse {
  bool success = 1;
  optional string error = 2;
}

message SearchGamesRequest {
  string correlation_id = 1;
  string query = 2;
  // Empty = fan out to all active gateways
  repeated string gateway_ids = 3;
  // e.g. "en", "de", used for locale-specific search optimizations in gateways
  // that support it;
  optional string locale = 4;
  optional int32 limit = 5;
  optional int32 offset = 6;
}

message SearchGameResult {
  string correlation_id = 1;
  string gateway_id = 2;
  bge.gateway.v1.ResultStatus status = 3;

  // Populated on RESULT
  optional bge.gateway.v1.GameSearchData game = 4;

  // Deduplication metadata resolved by coordinator against GameSource
  optional bool in_system = 5; // true = game already exists in local DB
  optional string game_id = 6; // local DB Game.id when in_system = true

  // Populated on ERROR / RATE_LIMITED
  optional string message = 7;
  optional int32 retry_after = 8;
}

message CoordinatorFetchGameRequest {
  string correlation_id = 1;
  string gateway_id = 2;
  string external_id = 3;
  optional string locale = 4;
}

message CoordinatorFetchGameResponse {
  string correlation_id = 1;
  string gateway_id = 2;
  bge.gateway.v1.ResultStatus status = 3;
  optional bge.gateway.v1.GameData game = 4;
  optional string message = 5;
}

message CoordinatorFetchExpansionsRequest {
  string correlation_id = 1;
  // Local DB Game.id — coordinator resolves gateway links internally
  string game_id = 2;
  optional string locale = 3;
}
