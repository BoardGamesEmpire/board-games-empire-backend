syntax = "proto3";

package bge.gateway.v1;

enum ContentType {
  CONTENT_TYPE_UNSPECIFIED = 0;
  CONTENT_TYPE_BASE_GAME = 1;
  CONTENT_TYPE_EXPANSION = 2;
  CONTENT_TYPE_DLC = 3;
  CONTENT_TYPE_STANDALONE_EXPANSION = 4;
  CONTENT_TYPE_ACCESSORY = 5;
  CONTENT_TYPE_BUNDLE = 6;
  CONTENT_TYPE_REMAKE = 7;
  CONTENT_TYPE_REMASTER = 8;
  CONTENT_TYPE_EXPANDED_EDITION = 9;
  CONTENT_TYPE_PORT = 10;
  CONTENT_TYPE_MOD = 11;
}

enum ResultStatus {
  RESULT_STATUS_UNSPECIFIED = 0;
  RESULT_STATUS_RESULT = 1;
  RESULT_STATUS_SOURCE_DONE = 2;
  RESULT_STATUS_ERROR = 3;
  RESULT_STATUS_RATE_LIMITED = 4;
  RESULT_STATUS_UNAVAILABLE = 5;
}

// Broad classification of a platform — used by clients to render
// platform-type icons and by the import wizard to group options.
enum PlatformType {
  PLATFORM_TYPE_UNSPECIFIED = 0;
  PLATFORM_TYPE_CONSOLE = 1;
  PLATFORM_TYPE_PC = 2;
  PLATFORM_TYPE_PORTABLE = 3;
  PLATFORM_TYPE_MOBILE = 4;
  PLATFORM_TYPE_ARCADE = 5;
  PLATFORM_TYPE_OTHER = 6;
  PLATFORM_TYPE_TABLETOP = 7;
}

enum AgeRatingAuthority {
  AGE_RATING_AUTHORITY_UNSPECIFIED = 0;
  AGE_RATING_AUTHORITY_ESRB = 1;
  AGE_RATING_AUTHORITY_PEGI = 2;
  AGE_RATING_AUTHORITY_CERO = 3;
  AGE_RATING_AUTHORITY_USK = 4;
  AGE_RATING_AUTHORITY_ACB = 5;
}

enum ReleaseStatus {
  RELEASE_STATUS_UNSPECIFIED = 0;
  RELEASE_STATUS_RELEASED = 1;
  RELEASE_STATUS_ALPHA = 2;
  RELEASE_STATUS_BETA = 3;
  RELEASE_STATUS_EARLY_ACCESS = 4;
  RELEASE_STATUS_OFFLINE = 5;
  RELEASE_STATUS_CANCELLED = 6;
  RELEASE_STATUS_RUMOURED = 7;
  RELEASE_STATUS_ANNOUNCED = 8;
  RELEASE_STATUS_POSTPONED = 9;
  RELEASE_STATUS_PRERELEASE = 10;
  RELEASE_STATUS_DELISTED = 11;
}

// Format a gateway uses when emitting language codes in LanguageData and when
// accepting locale parameters on inbound requests. Reflects the canonical
// Language model: ISO 639-1 (`abbreviation`), ISO 639-3 (`code`), and IETF
// BCP 47 (planned `ietfTag`). NAME and NATIVE_NAME are display-oriented
// fallbacks for sources that publish only display strings (BGG).
enum LanguageCodeFormat {
  LANGUAGE_CODE_FORMAT_UNSPECIFIED = 0;

  // ISO 639-1 two-letter code: "en", "de", "fr". Not all languages have one.
  LANGUAGE_CODE_FORMAT_ISO_639_1 = 1;

  // ISO 639-3 three-letter code: "eng", "deu", "fra". Every language has one.
  LANGUAGE_CODE_FORMAT_ISO_639_3 = 2;

  // IETF BCP 47 language tag: "en", "en-US", "de-DE", "zh-Hant".
  LANGUAGE_CODE_FORMAT_IETF_BCP_47 = 3;

  // English display name: "English", "German", "French".
  LANGUAGE_CODE_FORMAT_NAME = 4;

  // Native-language display name: "English", "Deutsch", "Français".
  LANGUAGE_CODE_FORMAT_NATIVE_NAME = 5;
}

message PersonData {
  string external_id = 1;
  string name = 2;
}

message PublisherData {
  string external_id = 1;
  string name = 2;
  optional string website = 3;
}

message MechanicData {
  string external_id = 1;
  string name = 2;
}

message CategoryData {
  string external_id = 1;
  string name = 2;
}

// BGG family or IGDB collection/franchise. family_type distinguishes them:
// BGG encodes type in the name prefix e.g. "Game: Catan Series" → type="Game".
// IGDB uses separate collection/franchise resources; use family_type="franchise"
// or family_type="collection" accordingly.
message FamilyData {
  string external_id = 1;
  string name = 2;
  optional string family_type = 3;
}

message PlatformData {
  string external_id = 1;
  string name = 2;
  optional string abbreviation = 3;
  PlatformType platform_type = 4;
}

// ISO 639-3 (3-char code) is the stable identifier — not all languages have
// an ISO 639-1 (2-char) code, so iso6391 is optional.
message LanguageData {
  // "eng", "fra", "zho"
  string iso6393 = 1;

  // "en", "fr", "zh" — absent for minority languages
  optional string iso6391 = 2;

  // "English", "French", "Chinese"
  string name = 3;
}

// A region a game was localized for. region_code follows ISO 3166-1 alpha-2 for
// country-level regions ("us", "jp", "de") or a compound code for multi-country
// regions ("eu", "as", "ww" for worldwide).
message RegionData {
  string external_id = 1;
  string name = 2;
  string region_code = 3;
}

// Localization data for a specific release within a region — title overrides
// and a region-specific release date if it differs from the global date.
message LocalizationData {
  RegionData region = 1;
  optional string localized_title = 2;
  optional string release_date = 3;
}

// A specific release/edition of a game on a platform. Carries both the
// catalog-edition identity (BGG version, IGDB release entity, retail SKU)
// and the regional availability metadata.
//
// One PlatformGame may have many releases:
//   - BGG with version data: one per published version
//   - BGG without version data: one synthetic "default" release
//   - IGDB / Steam: one per platform-region combination
//
// In search context (GameSearchData.available_releases), gateways populate
// identity and availability fields only — edition fields (edition_name,
// release_year, parent_edition_external_id, *_overrides)
// stay absent. Call FetchGame for full edition data.
message GameReleaseData {
  // ─── Identity ────────────────────────────────────────────────────────
  // Gateway-stable identifier for this edition. Maps to GameRelease.editionKey.
  //   - BGG: <version> id (e.g. "416798" for Catan Afrikaans edition)
  //   - BGG fallback (no version data): literal "default"
  //   - IGDB: release_date entity id
  //   - Steam: appid
  string external_id = 1;

  // Platform to which this release belongs. Required.
  PlatformData platform = 2;

  // ─── Edition identity ────────────────────────────────────────────────
  // Human-readable edition name. "5th Edition", "Deluxe Edition",
  // "Legacy Season 1". Absent for default editions.
  optional string edition_name = 3;

  // Year this edition was first published. Distinct from release_date which
  // is region-specific. Gateways must coerce sentinel zero values to absent.
  optional int32 release_year = 4;

  // External_id of the parent edition within the same GameData payload.
  // Used to build the GameRelease.parentReleaseId hierarchy. Resolved by
  // the import worker in a second pass after all releases are upserted.
  optional string parent_edition_external_id = 5;

  // ─── Regional availability ───────────────────────────────────────────
  ReleaseStatus status = 6;

  // ISO 8601 date string ("2007-09-25"). Region-specific; may differ from
  // release_year for late regional rollouts.
  optional string release_date = 7;

  repeated LocalizationData localizations = 8;
  repeated LanguageData languages = 9;

  // ─── Edition-level gameplay overrides ────────────────────────────────
  // Populate only when the edition genuinely differs from the parent
  // PlatformGame defaults. Resolution chain at read time:
  //   release.x ?? platformGame.x ?? game.x
  optional int32 min_players = 10;
  optional int32 max_players = 11;
  optional int32 min_playtime = 12;
  optional int32 max_playtime = 13;
}

// Regional availability for a DLC entry. DLC has no edition concept in the
// catalog model, so this is intentionally lighter than GameReleaseData —
// no edition_name, no release_year, no overrides, no parent hierarchy.
message DlcReleaseData {
  string external_id = 1;
  PlatformData platform = 2;
  ReleaseStatus status = 3;
  optional string release_date = 4;
  repeated LanguageData languages = 5;
  repeated LocalizationData localizations = 6;
}

message GenreData {
  string external_id = 1;
  string name = 2;
}

message ThemeData {
  string external_id = 1;
  string name = 2;
}

message AgeRatingData {
  AgeRatingAuthority authority = 1;
  string rating = 2;
  optional string synopsis = 3;
}

// Lightweight DLC record — no player counts, ratings, or taxonomy.
// Releases use DlcReleaseData (no edition fields, no overrides).
message DlcData {
  string external_id = 1;
  string name = 2;
  optional string description = 3;
  optional string thumbnail_url = 4;
  repeated DlcReleaseData releases = 5;
}

message GameSearchData {
  string external_id = 1;
  string title = 2;
  ContentType content_type = 3;
  optional int32 year_published = 4;
  optional string thumbnail_url = 5;
  optional string source_url = 6;
  optional float average_rating = 7;
  optional int32 min_players = 8;
  optional int32 max_players = 9;
  optional string base_game_external_id = 10;
  optional string summary = 11;

  // Platform chips — populated by gateways that expose platform data.
  // BGG gateways leave this empty; IGDB / Steam gateways populate it.
  repeated PlatformData available_platforms = 12;

  // Platform-specific releases at search granularity. Gateways populate
  // identity and availability fields only — edition fields stay absent.
  repeated GameReleaseData available_releases = 13;
}

message GameData {
  string external_id = 1;
  string title = 2;
  ContentType content_type = 3;

  optional string description = 4;
  optional int32 year_published = 5;
  optional string thumbnail_url = 6;
  optional string image_url = 7;
  optional string source_url = 8;

  repeated PersonData designers = 9;
  repeated PersonData artists = 10;
  repeated PublisherData publishers = 11;
  repeated MechanicData mechanics = 12;
  repeated CategoryData categories = 13;
  repeated FamilyData families = 14;

  optional float average_rating = 15;
  optional float bayes_rating = 16;
  optional int32 ratings_count = 17;
  optional int32 min_players = 18;
  optional int32 max_players = 19;
  optional int32 min_playtime = 20;
  optional int32 max_playtime = 21;
  optional int32 min_age = 22;
  optional int32 complexity_weight = 23;

  optional string base_game_external_id = 24;

  repeated PlatformData platforms = 25;
  repeated GameReleaseData releases = 26;

  repeated ThemeData themes = 27;
  repeated AgeRatingData age_ratings = 28;

  optional string summary = 29;

  repeated string metadata_keys = 30;
  repeated string metadata_values = 31;

  repeated DlcData dlc = 32;
}
