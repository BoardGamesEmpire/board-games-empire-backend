syntax = "proto3";

package bge.gateway.v1;

import "grpc/health/v1/health.proto";

option java_package = "com.bge.gateway.v1";
option java_multiple_files = true;

service GatewayService {
  rpc Ping(GatewayPingRequest) returns (GatewayPingResponse);

  // Standard health — gateways should report per-service health here
  rpc Health(grpc.health.v1.HealthCheckRequest) returns (grpc.health.v1.HealthCheckResponse);
}

message GatewayPingRequest {
  optional string correlation_id = 1;
}

message GatewayPingResponse {
  string correlation_id = 1;
  int64 timestamp_ms = 2;
  // Self-reported gateway identity — matches GameGateway.name in the DB
  string gateway_name = 3;
  string gateway_version = 4;
  // Advertised capabilities (service names), though reflection is authoritative
  repeated string supported_services = 5;
}
