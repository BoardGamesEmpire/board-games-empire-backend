syntax = "proto3";

package bge.gateway.v1;

import "bge/gateway/v1/common.proto";
import "grpc/health/v1/health.proto";

// Contract all external gateway implementations must satisfy.
// Normalization to GameSearchData/GameData happens at the gateway — the
// coordinator and main application are intentionally ignorant of
// source-specific schemas.
service GatewayService {
  // Liveness + capability advertisement
  rpc Ping(GatewayPingRequest) returns (GatewayPingResponse);

  // Standard gRPC health check
  rpc Check(grpc.health.v1.HealthCheckRequest) returns (grpc.health.v1.HealthCheckResponse);

  // Stream lean search results as they resolve. Gateways that do not support
  // pagination may silently ignore limit/offset. Must always terminate with
  // SOURCE_DONE or ERROR.
  rpc SearchGames(GatewaySearchRequest) returns (stream GatewaySearchResult);

  // Fetch full GameData for a single game — used by the import worker.
  rpc FetchGame(FetchGameRequest) returns (FetchGameResponse);

  // Fetch expansions/DLC for a base game. Streams lean GameSearchData frames,
  // terminated by SOURCE_DONE.
  rpc FetchExpansions(FetchExpansionsRequest) returns (stream GatewaySearchResult);
}

message GatewayPingRequest {
  optional string correlation_id = 1;
}

message GatewayPingResponse {
  string correlation_id = 1;
  int64 timestamp_ms = 2;
  string gateway_name = 3;
  string gateway_version = 4;
  repeated string supported_services = 5;
}

message GatewaySearchRequest {
  string correlation_id = 1;
  string query = 2;
  // e.g. "en", "de", used for locale-specific search optimizations in gateways
  // that support it;
  optional string locale = 3;
  optional int32 limit = 4;
  optional int32 offset = 5;
}

message GatewaySearchResult {
  string correlation_id = 1;
  ResultStatus status = 2;
  optional GameSearchData game = 3; // populated on RESULT
  optional string message = 4; // populated on ERROR / RATE_LIMITED
  optional int32 retry_after = 5; // seconds; populated on RATE_LIMITED only
}

message FetchGameRequest {
  string correlation_id = 1;
  string external_id = 2;
  optional string locale = 3;
}

message FetchGameResponse {
  string correlation_id = 1;
  ResultStatus status = 2;
  optional GameData game = 3;
  optional string message = 4;
}

message FetchExpansionsRequest {
  string correlation_id = 1;
  string base_external_id = 2;
  optional string locale = 3;
}
