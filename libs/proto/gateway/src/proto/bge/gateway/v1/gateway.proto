syntax = "proto3";

package bge.gateway.v1;

import "bge/gateway/v1/common.proto";
import "grpc/health/v1/health.proto";

service GatewayService {
  rpc Ping(GatewayPingRequest) returns (GatewayPingResponse);
  rpc Check(grpc.health.v1.HealthCheckRequest) returns (grpc.health.v1.HealthCheckResponse);
  rpc SearchGames(GatewaySearchRequest) returns (stream GatewaySearchResult);
  rpc FetchGame(FetchGameRequest) returns (FetchGameResponse);
  rpc FetchExpansions(FetchExpansionsRequest) returns (stream GatewaySearchResult);
  rpc ListLanguages(ListLanguagesRequest) returns (ListLanguagesResponse);
}

message GatewayPingRequest {
  optional string correlation_id = 1;
}

// Declares a gateway's language-code preferences. The coordinator uses
// `accepted_request_formats` to translate the user's locale into a format
// the gateway accepts before forwarding requests, and uses `response_format`
// to translate gateway-emitted LanguageData into the canonical format.
//
// `passthrough_raw_locale = true` opts out of coordinator translation on
// the request path — the user's raw locale string is forwarded unchanged.
// Useful for gateways with locale-aware behavior beyond simple language
// filtering (region-specific ranking, localized result content).
message GatewayLanguagePreferences {
  // Formats the gateway can accept on inbound requests, in order of
  // preference. Coordinator picks the first one it can satisfy.
  repeated LanguageCodeFormat accepted_request_formats = 1;

  // Format the gateway emits in LanguageData on responses.
  LanguageCodeFormat response_format = 2;

  // When true, coordinator forwards the user's raw locale string on
  // requests without translation. `accepted_request_formats` is ignored.
  bool passthrough_raw_locale = 3;
}

message GatewayPingResponse {
  string correlation_id = 1;
  int64 timestamp_ms = 2;
  string gateway_name = 3;
  string gateway_version = 4;
  repeated string supported_services = 5;

  // Language-code preferences. Coordinator-side translation may be deferred;
  // gateways should still declare accurate values so existing clients
  // continue to work without changes when translation lands.
  GatewayLanguagePreferences language_preferences = 6;
}

message ListLanguagesRequest {
  optional string correlation_id = 1;
}

// One language a gateway supports, in the gateway's native vocabulary.
// Returned by ListLanguages during the host's capabilities interview and
// upserted into LanguageGatewayLink rows.
message GatewayLanguageEntry {
  // The gateway-native value exactly as it appears in this gateway's
  // LanguageData and accepted request parameters: "en-US" (IETF_BCP_47),
  // "eng" (ISO_639_3), "English" (NAME).
  string value = 1;

  // How to interpret `value`.
  LanguageCodeFormat format = 2;

  // Optional enrichments — gateways fill only what they genuinely know.
  // A valid ietf_tag lets the host auto-resolve (and, policy permitting,
  // auto-add) the language without curation.
  optional string ietf_tag = 3;
  optional string iso6393 = 4;
  optional string iso6391 = 5;
  optional string name = 6;
  optional string native_name = 7;
}

message ListLanguagesResponse {
  string correlation_id = 1;
  repeated GatewayLanguageEntry languages = 2;
}

message GatewaySearchRequest {
  string correlation_id = 1;
  string query = 2;
  optional string locale = 3;
  optional int32 limit = 4;
  optional int32 offset = 5;
}

message GatewaySearchResult {
  string correlation_id = 1;
  ResultStatus status = 2;
  optional GameSearchData game = 3;
  optional string message = 4;
  optional int32 retry_after = 5;
}

message FetchGameRequest {
  string correlation_id = 1;
  string external_id = 2;
  optional string locale = 3;
}

message FetchGameResponse {
  string correlation_id = 1;
  ResultStatus status = 2;
  optional GameData game = 3;
  optional string message = 4;
}

message FetchExpansionsRequest {
  string correlation_id = 1;
  string base_external_id = 2;
  optional string locale = 3;
}
