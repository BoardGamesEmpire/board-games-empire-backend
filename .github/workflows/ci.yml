name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Set up environment
        run: cp .env.example .env

      - run: npm ci
      - uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: master

      - name: Generate Prisma client
        run: npx nx run database:generate

      - name: Generate protobuf types
        run: |
          npm run proto:clean
          npm run proto:deps
          npx nx run proto-gateway:buf-export
          npx nx run proto-gateway:generate

      - name: Check i18n types are up to date
        run: |
          npm run i18n:generate
          git diff --exit-code -- libs/common/i18n/src/lib/generated/i18n.generated.ts \
            || { echo "::error::i18n translation types are stale. Run 'npm run i18n:generate' and commit the result."; exit 1; }

      - name: Clean stale dist directories
        run: find libs apps -name "dist" -type d -prune -exec rm -rf {} + 2>/dev/null || true

      - run: npx nx run-many -t typecheck
      - run: npx nx affected -t test --parallel --maxParallel=3 --passWithNoTests
      - run: npx nx affected -t lint build --parallel --maxParallel=3

      - run: npx nx fix-ci
        if: always()
